<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DiamondBack Serial Lookup</title>
<style>
/* ===== Global Styles ===== */
body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: #f7f7f7;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

/* ===== Container ===== */
.container {
    background: #fff;
    padding: 40px 30px;
    margin: 50px 20px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    max-width: 480px;
    width: 100%;
    text-align: center;
}

/* ===== Heading ===== */
h2 {
    margin-bottom: 25px;
    font-weight: 600;
    color: #222;
    font-size: 26px;
}

/* ===== Input ===== */
input[type="text"] {
    width: 80%;
    padding: 12px 15px;
    margin-bottom: 15px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: all 0.2s ease-in-out;
}

input[type="text"]:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 6px rgba(0,123,255,0.3);
}

/* ===== Button ===== */
button {
    padding: 12px 25px;
    font-size: 16px;
    color: #fff;
    background-color: #007bff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
}

button:hover {
    background-color: #0056b3;
}

/* ===== Result Box ===== */
#result {
    margin-top: 25px;
    font-size: 17px;
    font-weight: 500;
    color: #333;
    background: #f2f2f2;
    padding: 20px;
    border-radius: 8px;
    text-align: left;
    line-height: 1.5;
    min-height: 60px;
    word-wrap: break-word;
}

/* ===== Responsive ===== */
@media (max-width: 500px) {
    .container {
        padding: 30px 20px;
        margin: 30px 10px;
    }
    input[type="text"] {
        width: 100%;
    }
}
</style>
</head>

<body>
<div class="container">
    <h2>DiamondBack Serial Lookup</h2>
    <input id="serial" placeholder="Enter Serial Number" type="text">
    <button onclick="decode()">Lookup</button>
    <div id="result"></div>
</div>

<script>
function decode(){
  let serial = document.getElementById("serial").value.toUpperCase();
  let result = document.getElementById("result");

  // -------------------
  // JERE FORMAT: LLL###
  // -------------------
  if(/^[WJ][A-L][GHI]\d{3}$/.test(serial)){
    let monthCode = serial.charAt(1);
    let yearCode = serial.charAt(2);
    let build = serial.substring(3,6);

    let months = {
      A:"January",B:"February",C:"March",D:"April",
      E:"May",F:"June",G:"July",H:"August",
      I:"September",J:"October",K:"November",L:"December"
    };
    let years = {G:"1977",H:"1978",I:"1979"};

    result.innerHTML =
      `<strong>Manufacturer:</strong> Jere Fabrications<br>` +
      `<strong>Year:</strong> ${years[yearCode]}<br>` +
      `<strong>Month:</strong> ${months[monthCode]}<br>` +
      `<strong>Production Number:</strong> ${build}<br>` +
      `<strong>Serial Format:</strong> Jere Fabrications`;
    return;
  }

  // -------------------
  // KOIZUMI VM FORMAT
  // -------------------
  if(/^VM\d{1,4}$/.test(serial)){
    let build = serial.substring(2);

    result.innerHTML =
      `<strong>Manufacturer:</strong> Koizumi<br>` +
      `<strong>Year:</strong> 1979<br>` +
      `<strong>Production Period:</strong> March–June<br>` +
      `<strong>Production Number:</strong> ${build}<br>` +
      `<strong>Serial Format:</strong> Koizumi`;
    return;
  }

  // -------------------
  // KOIZUMI KANJI FORMAT
  // -------------------
  if(/^[901234][A-Z]\d{4}[A-Z]?$/.test(serial)){
    let yearCode = serial.charAt(0);
    let monthCode = serial.charAt(1);
    let build = serial.substring(2,6);

    let years = {9:"1979",0:"1980",1:"1981",2:"1982",3:"1983",4:"1984"};
    let months = {A:"January",B:"February",C:"March",D:"April",E:"May",F:"June",G:"July",H:"August",
                  X:"September",J:"October",K:"November",L:"December"};

    result.innerHTML =
      `<strong>Manufacturer:</strong> Koizumi<br>` +
      `<strong>Year:</strong> ${years[yearCode]}<br>` +
      `<strong>Month:</strong> ${months[monthCode]}<br>` +
      `<strong>Production Number:</strong> ${build}<br>` +
      `<strong>Serial Format:</strong> Koizumi`;
    return;
  }

  // -------------------
  // FAIRLY FORMAT
  // -------------------
  if(/^F[0-5C]\d{2}\d{4}$/.test(serial)){
    let yearCode = serial.charAt(1);
    let month = serial.substring(2,4);
    let build = serial.substring(4);

    if(yearCode === "C") yearCode = "0";

    let years = {0:"1980",1:"1981",2:"1982",3:"1983",4:"1984",5:"1985"};
    let monthNames = {"01":"January","02":"February","03":"March","04":"April","05":"May",
                      "06":"June","07":"July","08":"August","09":"September",
                      "10":"October","11":"November","12":"December"};

    result.innerHTML =
      `<strong>Manufacturer:</strong> Fairly Bike Co<br>` +
      `<strong>Year:</strong> ${years[yearCode]}<br>` +
      `<strong>Month:</strong> ${monthNames[month]}<br>` +
      `<strong>Production Number:</strong> ${build}<br>` +
      `<strong>Serial Format:</strong> Fairly Bike Co`;
    return;
  }

  result.innerHTML = "Serial number not recognised.";
}
</script>
</body>
</html>
