<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX Serial Decoder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .decoder-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #1a73e8; margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #1557b0; }
        
        #result { margin-top: 20px; }
        .result-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            border-bottom: 2px solid #1a73e8;
            display: inline-block;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
        }
        .result-table td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        .result-table td:first-child {
            font-weight: bold;
            width: 40%;
        }
        .error { color: #d93025; font-size: 14px; }
    </style>
</head>
<body>

<div class="decoder-card">
    <h2>MX Decoder</h2>
    <p>Enter your serial number (e.g., WAI123):</p>
    <input type="text" id="serialInput" placeholder="e.g. WAI123" maxlength="6">
    <button onclick="decodeSerial()">Decode Serial</button>
    
    <div id="result"></div>
</div>

<script>
function decodeSerial() {
    const serial = document.getElementById('serialInput').value.toUpperCase();
    const result = document.getElementById('result');
    
    // Your provided logic starts here
    if(/^[WJ][A-L][GHI]\d{3}$/.test(serial)){
        let monthCode = serial.charAt(1);
        let yearCode = serial.charAt(2);
        let build = serial.substring(3,6);
        
        let months = {
            A:"January", B:"February", C:"March", D:"April", 
            E:"May", F:"June", G:"July", H:"August", 
            I:"September", J:"October", K:"November", L:"December"
        };
        
        let years = { G:"1977", H:"1978", I:"1979" };
        let year = years[yearCode];
        let generation = (year === "1977") ? "1st Generation MX" : "2nd Generation MX";

        result.innerHTML = `
            <div class="result-title">Serial Details</div>
            <table class="result-table">
                <tr><td>Manufacturer:</td><td>Jere</td></tr>
                <tr><td>Year:</td><td>${year}</td></tr>
                <tr><td>Month:</td><td>${months[monthCode]}</td></tr>
                <tr><td>Model:</td><td>MX</td></tr>
                <tr><td>Generation:</td><td>${generation}</td></tr>
                <tr><td>Build No:</td><td>${build}</td></tr>
            </table>`;
    } else {
        result.innerHTML = '<p class="error">Invalid Serial Format. Expected: [W/J][A-L][G-I][000]</p>';
    }
}
</script>

</body>
</html>
