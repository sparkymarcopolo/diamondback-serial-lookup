<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Number Decoder v4.2</title>
    <style>
        /* UI STYLING SECTION */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .decoder-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 480px; position: relative; }
        h2 { color: #23272b; text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .version-tag { text-align: center; font-size: 11px; color: #adb5bd; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; }
        
        .input-group { margin: 15px 0 15px 0; }
        input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-transform: uppercase; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 14px; background: #23272b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #000000; }

        /* RESULT STYLING SECTION */
        #result { margin-top: 30px; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table td { padding: 12px 5px; border-bottom: 1px solid #f8f9fa; font-size: 15px; }
        .result-table td:first-child { font-weight: 600; color: #6c757d; width: 50%; }
        .result-table td:last-child { color: #212529; text-align: right; }
        
        /* SELECTOR STYLING */
        .model-selector { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px dashed #dee2e6; }
        .model-selector label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 10px; color: #495057; letter-spacing: 0.5px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ced4da; background: white; font-size: 13px; color: #212529; margin-bottom: 10px; }
        
        .error { color: #dc3545; text-align: center; font-weight: 500; padding: 15px; background: #fff5f5; border-radius: 8px; border: 1px solid #ff000021; }
        .warning-text { color: #dc3545; font-size: 12px; margin-top: 10px; font-weight: 600; text-align: center; display: none; line-height: 1.4; }
        .sub-selection { display: none; margin-top: 10px; border-top: 1px solid #e9ecef; padding-top: 10px; }
    </style>
</head>
<body>

<div class="decoder-card">
    <h2>Frame Number Decoder</h2>
    <div class="version-tag">Version 4.2</div>
    
    <div class="input-group">
        <input type="text" id="serialInput" placeholder="Enter Frame Number..." spellcheck="false">
    </div>
    
    <button onclick="runDecoder()">Decode Frame</button>

    <div id="result"></div>
</div>

<script>
/**
 * MAIN DECODER ENGINE
 */
function runDecoder() {
    const serial = document.getElementById('serialInput').value.trim().toUpperCase();
    const result = document.getElementById('result');
    result.innerHTML = ""; 

    if (!serial) {
        result.innerHTML = '<div class="error">Please enter a frame number to begin.</div>';
        return;
    }

    // --- DECODER 1: FABRICATIONS BY JERE ---
    if (/^[WJ][A-L][GHI]\d{3}$/.test(serial)) {
        let monthCode = serial.charAt(1);
        let yearCode = serial.charAt(2);
        let build = serial.substring(3, 6);
        let months = {A:"January", B:"February", C:"March", D:"April", E:"May", F:"June", G:"July", H:"August", I:"September", J:"October", K:"November", L:"December"};
        let years = { G: "1977", H: "1978", I: "1979" };
        let year = years[yearCode];
        let gen = (year === "1977") ? "1st" : "2nd";

        result.innerHTML = renderTable(year, months[monthCode], `#${build}`, "MX", gen, "Fabrications by Jere", "Sequential build number");
        return; 
    }

    // --- DECODER 2: KOIZUMI FACTORY (VM FORMAT) ---
    if (/^VM\d{1,5}$/.test(serial)) {
        let build = serial.substring(2);
        result.innerHTML = renderTable("1979", "March–June", `#${build}`, "Pro (aka Large Pro)", "1st", "Koizumi Factory", "Sequential build number");
        return;
    }

    // --- DECODER 3: KOIZUMI FACTORY (KANJI FORMAT 1979-1984) ---
    if (/^[901234][A-Z]\d{4}[A-Z]?$/.test(serial)) {
        let yearCode = serial.charAt(0);
        let monthCode = serial.charAt(1);
        let build = serial.substring(2, 6);
        let years = { 9:"1979", 0:"1980", 1:"1981", 2:"1982", 3:"1983", 4:"1984" };
        let months = { A:"January", B:"February", C:"March", D:"April", E:"May", F:"June", G:"July", H:"August", X:"September", J:"October", K:"November", L:"December" };
        let year = years[yearCode];

        if (yearCode === "9") {
            result.innerHTML = renderTable(year, months[monthCode], `#${build}`, "Pro (aka Large Pro)", "2nd", "Koizumi Factory", "Sequential build number");
        } else {
            result.innerHTML = `
                <div id="kanjiResult">
                    ${renderTable(year, months[monthCode], `#${build}`, "TBC", "TBC", "Koizumi Factory", "Build number of month")}
                </div>
                <div class="model-selector">
                    <label>IDENTIFY FRAME FEATURES:</label>
                    <select id="featureSelect" onchange="processKanjiSelection('${serial}')">
                        <option value="">-- Select Features --</option>
                        <option value="pro">3mm Dropouts, Looptail, US BB, Large Gusset (Pro)</option>
                        <option value="tk">3mm Dropouts, Sticktail, US BB, Large Gusset (TK)</option>
                        <option value="mini">2mm Dropouts, Looptail, Euro BB, Large Gusset (Pro Mini)</option>
                        <option value="medium">2mm Dropouts, Looptail, US BB, Large Gusset, Laidback Post (Pro Medium)</option>
                        <option value="senior">2mm Dropouts, Looptail, US BB, Large Gusset, Vertical Post (Pro Senior)</option>
                        <option value="streak">3mm Dropouts, Looptail, US BB, Large Gusset, Laidback Post (Silver Streak)</option>
                        <option value="turbo">2mm Dropouts, Looptail, US BB, Large Gusset, Vertical Post, Turbo Smoke (HL Turbo 1st/2nd Gen)</option>
                        <option value="turbo3">2mm Dropouts, Looptail, US BB, Small Diamond Gusset (HL Turbo 3rd Gen)</option>
                        <option value="f1">2mm Dropouts, Sticktail, US BB, Small Diamond Gusset (Formula 1)</option>
                        <option value="turbolite">2mm Dropouts, Sticktail, Euro BB, No Gusset (Turbo-Lite)</option>
                        <option value="unknown">Other features / Not listed</option>
                    </select>
                    
                    <div id="seniorSubSelection" class="sub-selection">
                        <label>UPDATED DROPOUT LEVERAGE?</label>
                        <select id="leverageSelect" onchange="updateSeniorGen('${serial}')">
                            <option value="no">No (Standard Leverage)</option>
                            <option value="yes">Yes (Updated Leverage)</option>
                        </select>
                    </div>

                    <div id="warningBox" class="warning-text"></div>
                </div>`;
        }
        return;
    }

    result.innerHTML = '<div class="error">Frame number pattern not recognized.</div>';
}

/**
 * HELPER: TABLE GENERATOR
 */
function renderTable(year, month, build, model, gen, man, label) {
    const noGenModels = ["TK", "Pro Mini", "Pro Medium"];
    const genStyle = (noGenModels.includes(model)) ? 'style="display:none;"' : '';
    
    return `
        <table class="result-table">
            <tr><td>Year:</td><td>${year}</td></tr>
            <tr><td>Month:</td><td>${month}</td></tr>
            <tr><td>${label}:</td><td>${build}</td></tr>
            <tr class="row-model"><td>Model:</td><td>${model}</td></tr>
            <tr class="row-gen" ${genStyle}><td>Generation:</td><td>${gen}</td></tr>
            <tr><td>Manufacturer:</td><td>${man}</td></tr>
        </table>`;
}

/**
 * HELPER: INTERACTIVE UPDATE
 */
function processKanjiSelection(serial) {
    const selection = document.getElementById('featureSelect').value;
    const seniorSub = document.getElementById('seniorSubSelection');
    const modelCell = document.querySelector('.row-model td:last-child');
    const genCell = document.querySelector('.row-gen td:last-child');
    const genRow = document.querySelector('.row-gen');
    const warning = document.getElementById('warningBox');
    const yearCode = serial.charAt(0);
    
    warning.style.display = "none";
    warning.innerText = "";
    seniorSub.style.display = "none";

    if (selection === "pro") {
        if (yearCode !== '0' && yearCode !== '1') {
            warning.innerText = "⚠️ Feature mismatch: Pro (aka Large Pro) was only produced in Kanji format from 1979 to 1981.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Pro (aka Large Pro)";
            genCell.innerText = "2nd";
            genRow.style.display = "table-row";
        }
    } else if (selection === "tk") {
        if (yearCode !== '0') {
            warning.innerText = "⚠️ Feature mismatch: TK model was only produced in 1980 (Serial starts with 0).";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "TK";
            genRow.style.display = "none";
        }
    } else if (selection === "mini") {
        if (yearCode !== '1') {
            warning.innerText = "⚠️ Feature mismatch: Pro Mini only produced in 1981 (Serial starts with 1).";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Pro Mini";
            genRow.style.display = "none";
        }
    } else if (selection === "medium") {
        if (yearCode !== '1' && yearCode !== '2' && yearCode !== '3') {
            warning.innerText = "⚠️ Feature mismatch: Pro Medium serial dates were only between 1981 and 1983.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Pro Medium";
            genRow.style.display = "none";
        }
    } else if (selection === "senior" || selection === "turbo") {
        const modelName = (selection === "senior") ? "Pro Senior" : "Harry Leary Turbo";
        if (yearCode !== '1' && yearCode !== '2' && yearCode !== '3') {
            warning.innerText = `⚠️ Feature mismatch: ${modelName} serial dates were only between 1981 and 1983.`;
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = modelName;
            seniorSub.style.display = "block";
            updateSeniorGen(serial);
            genRow.style.display = "table-row";
        }
    } else if (selection === "turbo3") {
        if (yearCode !== '4') {
            warning.innerText = "⚠️ Feature mismatch: 3rd Gen Harry Leary Turbo was only produced in 1984.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Harry Leary Turbo";
            genCell.innerText = "3rd";
            genRow.style.display = "table-row";
        }
    } else if (selection === "streak") {
        if (yearCode !== '1' && yearCode !== '2' && yearCode !== '3') {
            warning.innerText = "⚠️ Feature mismatch: Silver Streak serial dates were only between 1981 and 1983.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Silver Streak";
            genCell.innerText = "1st";
            genRow.style.display = "table-row";
        }
    } else if (selection === "f1") {
        if (yearCode !== '3' && yearCode !== '4') {
            warning.innerText = "⚠️ Feature mismatch: Formula 1 serial dates were only between 1983 and 1984.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Formula 1";
            genCell.innerText = "1st";
            genRow.style.display = "table-row";
        }
    } else if (selection === "turbolite") {
        if (yearCode !== '3' && yearCode !== '4') {
            warning.innerText = "⚠️ Feature mismatch: Turbo-Lite serial dates were only between 1983 and 1984.";
            warning.style.display = "block";
            modelCell.innerText = "TBC";
            genRow.style.display = "table-row";
            genCell.innerText = "TBC";
        } else {
            modelCell.innerText = "Turbo-Lite";
            genCell.innerText = "1st";
            genRow.style.display = "table-row";
        }
    } else {
        modelCell.innerText = "TBC";
        genCell.innerText = "TBC";
        genRow.style.display = "table-row";
    }
}

function updateSeniorGen(serial) {
    const leverage = document.getElementById('leverageSelect').value;
    const selectEl = document.getElementById('featureSelect');
    const modelText = selectEl.options[selectEl.selectedIndex].text;
    const modelName = modelText.includes('HL Turbo') ? "Harry Leary Turbo" : "Pro Senior";
    
    const genCell = document.querySelector('.row-gen td:last-child');
    const warning = document.getElementById('warningBox');
    const yearCode = serial.charAt(0);
    
    warning.style.display = "none";
    warning.innerText = "";

    if (leverage === "no") {
        if (yearCode !== '1' && yearCode !== '2') {
            warning.innerText = `⚠️ Feature mismatch: 1st Gen ${modelName} was only produced in 1981 and 1982.`;
            warning.style.display = "block";
            genCell.innerText = "TBC";
        } else {
            genCell.innerText = "1st";
        }
    } else {
        if (yearCode !== '2' && yearCode !== '3') {
            warning.innerText = `⚠️ Feature mismatch: 2nd Gen ${modelName} was only produced in 1982 and 1983.`;
            warning.style.display = "block";
            genCell.innerText = "TBC";
        } else {
            genCell.innerText = "2nd";
        }
    }
}
</script>
</body>
</html>
