<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DiamondBack Serial Lookup</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:0;
display:flex;
justify-content:center;
padding-top:60px;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
width:420px;
text-align:center;
}

h2{
margin-top:0;
font-weight:600;
}

input{
width:90%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:10px 22px;
font-size:15px;
border:none;
background:#2c6ed5;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1f55a7;
}

.examples{
font-size:13px;
color:#777;
margin-bottom:20px;
}

#result{
margin-top:20px;
background:#f2f2f2;
padding:18px;
border-radius:8px;
text-align:left;
font-size:16px;
line-height:1.5;
min-height:70px;
}

.result-title{
font-weight:bold;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>DiamondBack Serial Lookup</h2>

<input id="serial"
placeholder="Enter Serial Number"
type="text"
oninput="decode()"
onkeypress="if(event.key==='Enter'){decode();}">

<div class="examples">
Examples: WAG123 • VM2456 • 1A0345 • F2010123
</div>

<button onclick="decode()">Decode Serial</button>

<div id="result"></div>

</div>

<script>

function decode(){

let serial=document.getElementById("serial").value.toUpperCase().trim();
let result=document.getElementById("result");

if(serial===""){
result.innerHTML="";
return;
}





/* -----------------
JERE FORMAT
LLL###
------------------*/

if(/^[WJ][A-L][GHI]\d{3}$/.test(serial)){

let monthCode = serial.charAt(1);
let yearCode = serial.charAt(2);
let build = serial.substring(3,6);

let months={
A:"January",
B:"February",
C:"March",
D:"April",
E:"May",
F:"June",
G:"July",
H:"August",
I:"September",
J:"October",
K:"November",
L:"December"
};

let years={
G:"1977",
H:"1978",
I:"1979"
};

let year = years[yearCode];

let model="MX";
let generation="";
let characteristics="";
let productionWindow="";
let notes="";

/* MODEL LOGIC */

if(year==="1977"){

generation="1st Generation MX";

characteristics="Euro Bottom Bracket Shell, Looptail, Large Diamond Gusset";

productionWindow="November – December 1977";

notes="First Diamond Back BMX model";

}

if(year==="1978"){

generation="2nd Generation MX";

characteristics="US Bottom Bracket Shell, Looptail, Large Diamond Gusset";

productionWindow="January 1978 – February 1979";

}

if(year==="1979"){

generation="2nd Generation MX";

characteristics="US Bottom Bracket Shell, Looptail, Large Diamond Gusset";

productionWindow="January 1978 – February 1979";

notes="Final Jere fabrication period. This marked the end of Jere manufacturing for Diamond Back and the final use of the MX model name.";

}

/* OUTPUT */

result.innerHTML =
`<div class="result-title">Serial Number Details</div>
<strong>Manufacturer:</strong> Jere<br>
<strong>Year:</strong> ${year}<br>
<strong>Month:</strong> ${months[monthCode]}<br>
<strong>Production Number:</strong> ${build}<br>
<strong>Model:</strong> ${model}<br>
<strong>Generation:</strong> ${generation}<br>
<strong>Production Window:</strong> ${productionWindow}<br>
<strong>Characteristics:</strong> ${characteristics}<br>
<strong>MX Production Era:</strong> 1977 – 1979<br>
<strong>Notes:</strong> ${notes}<br>
<strong>Serial Format:</strong> Jere Fabrication (1977–1979)`;

return;

}





/* -----------------
KOIZUMI VM FORMAT
------------------*/

if(/^VM\d{1,4}$/.test(serial)){

let build=serial.substring(2);

result.innerHTML=
`<div class="result-title">Serial Number Details</div>
<strong>Manufacturer:</strong> Koizumi<br>
<strong>Year:</strong> 1979<br>
<strong>Production Period:</strong> March–June<br>
<strong>Production Number:</strong> ${build}<br>
<strong>Serial Format:</strong> Koizumi`;

return;

}





/* -----------------
KOIZUMI KANJI FORMAT
------------------*/

if(/^[901234][A-Z]\d{4}[A-Z]?$/.test(serial)){

let yearCode=serial.charAt(0);
let monthCode=serial.charAt(1);
let build=serial.substring(2,6);

let years={
9:"1979",
0:"1980",
1:"1981",
2:"1982",
3:"1983",
4:"1984"
};

let months={
A:"January",
B:"February",
C:"March",
D:"April",
E:"May",
F:"June",
G:"July",
H:"August",
X:"September",
J:"October",
K:"November",
L:"December"
};

result.innerHTML=
`<div class="result-title">Serial Number Details</div>
<strong>Manufacturer:</strong> Koizumi<br>
<strong>Year:</strong> ${years[yearCode]}<br>
<strong>Month:</strong> ${months[monthCode]}<br>
<strong>Production Number:</strong> ${build}<br>
<strong>Serial Format:</strong> Koizumi`;

return;

}





/* -----------------
FAIRLY FORMAT
------------------*/

if(/^F[0-5C]\d{2}\d{4}$/.test(serial)){

let yearCode=serial.charAt(1);
let month=serial.substring(2,4);
let build=serial.substring(4);

if(yearCode==="C"){yearCode="0";}

let years={
0:"1980",
1:"1981",
2:"1982",
3:"1983",
4:"1984",
5:"1985"
};

let monthNames={
"01":"January",
"02":"February",
"03":"March",
"04":"April",
"05":"May",
"06":"June",
"07":"July",
"08":"August",
"09":"September",
"10":"October",
"11":"November",
"12":"December"
};

result.innerHTML=
`<div class="result-title">Serial Number Details</div>
<strong>Manufacturer:</strong> Fairly Bike Co<br>
<strong>Year:</strong> ${years[yearCode]}<br>
<strong>Month:</strong> ${monthNames[month]}<br>
<strong>Production Number:</strong> ${build}<br>
<strong>Serial Format:</strong> Fairly Bike Co`;

return;

}





result.innerHTML="Serial number not recognised.";

}

</script>

</body>
</html>
