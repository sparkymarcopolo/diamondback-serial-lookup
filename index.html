<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Back Serial Lookup</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:50px;
}

.container{
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
  width:720px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

input[type="text"]{
  width:60%;
  padding:10px;
  font-size:16px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  padding:10px 20px;
  font-size:16px;
  border-radius:5px;
  border:none;
  background:#007BFF;
  color:white;
  cursor:pointer;
  margin-left:10px;
}

button:hover{
  background:#0056b3;
}

.result-title{
  font-size:20px;
  margin-top:30px;
  margin-bottom:15px;
  font-weight:bold;
}

.result-table{
  width:100%;
  border-collapse: collapse;
  text-align:left;
  font-size:16px;
}

.result-table td{
  padding:6px 12px;
  border-bottom:1px solid #ddd;
  vertical-align:top;
}

.result-table td:first-child{
  font-weight:bold;
  width:200px;
}
</style>
</head>
<body>
<div class="container">
<h1>Diamond Back Serial Lookup</h1>
<input type="text" id="serialInput" placeholder="Enter Serial Number">
<button onclick="lookupSerial()">Lookup</button>
<div id="result"></div>
</div>

<script>
function lookupSerial(){
let serial=document.getElementById("serialInput").value.trim().toUpperCase();
let result=document.getElementById("result");
result.innerHTML=""; // clear previous result

/* -----------------
JERE FORMAT LLL###
------------------*/
if(/^[WJ][A-L][GHI]\d{3}$/.test(serial)){
let monthCode = serial.charAt(1);
let yearCode = serial.charAt(2);
let build = serial.substring(3,6);

let months={
A:"January",B:"February",C:"March",D:"April",E:"May",F:"June",
G:"July",H:"August",I:"September",J:"October",K:"November",L:"December"
};

let years={
G:"1977",
H:"1978",
I:"1979"
};

let year = years[yearCode];
let model="MX";
let generation="";
let productionWindow="";
let frameMaterial="Chromoly";
let bottomBracket="";
let characteristics="Looptail, Large Diamond Gusset";
let notes="";

/* MODEL LOGIC */
if(year==="1977"){
  generation="1st Generation MX";
  bottomBracket="Euro Bottom Bracket Shell";
  productionWindow="September – December 1977"; // updated
  notes="First Diamond Back BMX model";
}
if(year==="1978"){
  generation="2nd Generation MX";
  bottomBracket="US Bottom Bracket Shell";
  productionWindow="January 1978 – February 1979";
}
if(year==="1979"){
  generation="2nd Generation MX";
  bottomBracket="US Bottom Bracket Shell";
  productionWindow="January 1978 – February 1979";
  notes="Final Jere fabrication period. This marked the end of Jere manufacturing for Diamond Back and the final use of the MX model name.";
}

/* OUTPUT TABLE */
result.innerHTML =
`<div class="result-title">Serial Number Details</div>
<table class="result-table">
<tr><td>Manufacturer:</td><td>Jere</td></tr>
<tr><td>Year:</td><td>${year}</td></tr>
<tr><td>Month:</td><td>${months[monthCode]}</td></tr>
<tr><td>Production Number:</td><td>${build}</td></tr>
<tr><td>Model:</td><td>${model}</td></tr>
<tr><td>Generation:</td><td>${generation}</td></tr>
<tr><td>MX Production Era:</td><td>1977 – 1979</td></tr>
<tr><td>Production Window:</td><td>${productionWindow}</td></tr>
<tr><td>Frame Material:</td><td>${frameMaterial}</td></tr>
<tr><td>Bottom Bracket:</td><td>${bottomBracket}</td></tr>
<tr><td>Characteristics:</td><td>${characteristics}</td></tr>
<tr><td>Notes:</td><td>${notes}</td></tr>
</table>`;
return;
}

/* -----------------
KOIZUMI VM FORMAT (1979)
-----------------*/
if(/^VM\d{3,5}$/.test(serial)){
let build = serial.substring(2);
let manufacturer="Koizumi";
let year="1979";
let month="March – June";
let model="???"; // provide later
let generation="???"; // provide later
let productionWindow="???"; // provide later
let frameMaterial="???"; // provide later
let bottomBracket="???"; // provide later
let characteristics="???"; // provide later
let notes="Early Koizumi production, build number only";

result.innerHTML =
`<div class="result-title">Serial Number Details</div>
<table class="result-table">
<tr><td>Manufacturer:</td><td>${manufacturer}</td></tr>
<tr><td>Year:</td><td>${year}</td></tr>
<tr><td>Month:</td><td>${month}</td></tr>
<tr><td>Build Number:</td><td>${build}</td></tr>
<tr><td>Model:</td><td>${model}</td></tr>
<tr><td>Generation:</td><td>${generation}</td></tr>
<tr><td>Production Window:</td><td>${productionWindow}</td></tr>
<tr><td>Frame Material:</td><td>${frameMaterial}</td></tr>
<tr><td>Bottom Bracket:</td><td>${bottomBracket}</td></tr>
<tr><td>Characteristics:</td><td>${characteristics}</td></tr>
<tr><td>Notes:</td><td>${notes}</td></tr>
</table>`;
return;
}

/* -----------------
KOIZUMI KANJI FORMAT (#L####[#])
-----------------*/
if(/^\d[A-Z]\d{3,4}[A-Z]?$/.test(serial)){
let yearCode = serial.charAt(0);
let monthCode = serial.charAt(1);
let build = serial.substring(2,6);
let manStamp = serial.length>6 ? serial.charAt(6) : "";

let koizumiYears={"9":"1979","0":"1980","1":"1981","2":"1982","3":"1983","4":"1984"};
let koizumiMonths={A:"January",B:"February",C:"March",D:"April",E:"May",F:"June",
G:"July",H:"August",I:"September",X:"September",J:"October",K:"November",L:"December"};

let year=koizumiYears[yearCode];
let month=koizumiMonths[monthCode];

let manufacturer="Koizumi";
let model="???"; // provide later
let generation="???"; // provide later
let productionWindow="???"; // provide later
let frameMaterial="???"; // provide later
let bottomBracket="???"; // provide later
let characteristics="???"; // provide later
let notes=""; // provide later

result.innerHTML =
`<div class="result-title">Serial Number Details</div>
<table class="result-table">
<tr><td>Manufacturer:</td><td>${manufacturer}</td></tr>
<tr><td>Year:</td><td>${year}</td></tr>
<tr><td>Month:</td><td>${month}</td></tr>
<tr><td>Build Number:</td><td>${build}</td></tr>
<tr><td>Model:</td><td>${model}</td></tr>
<tr><td>Generation:</td><td>${generation}</td></tr>
<tr><td>Production Window:</td><td>${productionWindow}</td></tr>
<tr><td>Frame Material:</td><td>${frameMaterial}</td></tr>
<tr><td>Bottom Bracket:</td><td>${bottomBracket}</td></tr>
<tr><td>Characteristics:</td><td>${characteristics}</td></tr>
<tr><td>Notes:</td><td>${notes}</td></tr>
</table>`;
return;
}

/* -----------------
FAIRLY FORMAT
-----------------*/
if(/^F[0-5]\d{6}$/.test(serial)){  // <-- corrected: 6 digits after F
    let yearCode = serial.charAt(1);
    let monthCode = serial.substring(2,4);
    let build = serial.substring(4,8);

    let fairYears={"0":"1980","1":"1981","2":"1982","3":"1983","4":"1984","5":"1985"};
    let year=fairYears[yearCode];

    // Convert month number to month name
    let monthNum=parseInt(monthCode,10);
    let monthName = (monthNum>=1 && monthNum<=12) ? 
        new Date(2000, monthNum-1, 1)
        .toLocaleString('default',{month:'long'}) 
        : "Unknown";

    let manufacturer="Fairly";
    let model="???"; // fill later
    let generation="???"; // fill later
    let productionWindow="???"; // fill later
    let frameMaterial="???"; // fill later
    let bottomBracket="???"; // fill later
    let characteristics="???"; // fill later
    let notes=""; // fill later

    result.innerHTML =
    `<div class="result-title">Serial Number Details</div>
    <table class="result-table">
    <tr><td>Manufacturer:</td><td>${manufacturer}</td></tr>
    <tr><td>Year:</td><td>${year}</td></tr>
    <tr><td>Month:</td><td>${monthName}</td></tr>
    <tr><td>Build Number:</td><td>${build}</td></tr>
    <tr><td>Model:</td><td>${model}</td></tr>
    <tr><td>Generation:</td><td>${generation}</td></tr>
    <tr><td>Production Window:</td><td>${productionWindow}</td></tr>
    <tr><td>Frame Material:</td><td>${frameMaterial}</td></tr>
    <tr><td>Bottom Bracket:</td><td>${bottomBracket}</td></tr>
    <tr><td>Characteristics:</td><td>${characteristics}</td></tr>
    <tr><td>Notes:</td><td>${notes}</td></tr>
    </table>`;
    return;
}

/* -----------------
UNKNOWN SERIAL
-----------------*/
result.innerHTML="<p>Serial format not recognized.</p>";
}
</script>
</body>
</html>
